<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker Pro | Full</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0b0e14;
            --card-bg: #1a1f26;
            --text: #e0e6ed;
            --accent: #7fffd4;
            --success: #00e676;
            --warning: #ffeb3b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            padding-bottom: 50px;
        }

        .container { max-width: 1200px; margin: auto; }

        header { text-align: center; padding: 20px 0; }
        h1 { margin: 0; color: var(--primary); font-size: 1.8rem; }

        /* SECCIONES PRINCIPALES */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h2 { color: var(--accent); font-size: 1.2rem; margin-top: 0; border-left: 4px solid var(--accent); padding-left: 10px; }

        /* TABLAS Y INPUTS */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { font-size: 0.8rem; color: var(--secondary); text-align: center; padding: 8px; }
        td { padding: 8px; text-align: center; }

        input[type="number"], select {
            background: #252b33;
            border: 1px solid #3d4450;
            color: white;
            padding: 8px;
            border-radius: 8px;
            width: 80%;
        }

        .btn {
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            color: #000; font-weight: bold; border: none; padding: 10px 20px;
            border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px;
        }

        /* BARRAS DE PROGRESO */
        .progress-box { background: #252b33; border-radius: 50px; height: 12px; margin: 15px 0; overflow: hidden; }
        .bar { height: 100%; background: var(--primary); width: 0%; transition: 1s; box-shadow: 0 0 10px var(--primary); }

        /* GRID DE RUTINA POR DÍAS */
        .rutina-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        .dia-card {
            background: rgba(255,255,255,0.02);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .ejercicio-item {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.03);
            margin: 6px 0;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
        }

        .nombre-ej { flex-grow: 1; font-size: 0.9rem; }
        .check-box { width: 22px; height: 22px; accent-color: var(--success); }

        /* MODAL */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--card-bg); margin: 15% auto; padding: 25px;
            width: 85%; max-width: 450px; border-radius: 20px; border: 1px solid var(--primary);
        }
        .close { float: right; font-size: 28px; cursor: pointer; color: #666; }

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>TRACKER FITNESS TOTAL</h1>
    </header>

    <div class="main-grid">
        <div class="card">
            <h2>📉 Control de Peso</h2>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="pesoActual" placeholder="Peso (kg)">
                <button class="btn" onclick="guardarPeso()" style="margin:0; width:auto;">OK</button>
            </div>
            <div class="progress-box"><div class="bar" id="barraPeso"></div></div>
            <p id="mensajePeso" style="text-align: center; font-weight: bold; font-size: 0.9rem;"></p>
            <table id="tablaPeso">
                <thead><tr><th>#</th><th>Peso</th><th>Estado</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="card">
            <h2>🌙 Registro de Sueño</h2>
            <table>
                <tr><th>Día</th><th>Horas</th><th>Calidad</th></tr>
                <script>
                    const diasSeman = ["Lun", "Mar", "Mié", "Jue", "Vie", "Sáb", "Dom"];
                    diasSeman.forEach(d => {
                        document.write(`<tr>
                            <td>${d}</td>
                            <td><input type="number" class="sueño-h" style="width:45px"></td>
                            <td><select class="sueño-q"><option>Bien</option><option>Normal</option><option>Mal</option></select></td>
                        </tr>`);
                    });
                </script>
            </table>
        </div>
    </div>

    <div class="card">
        <h2>📅 Rutina Semanal (Toca para ver técnica)</h2>
        <div class="rutina-grid">
            <div class="dia-card">
                <h3 style="color:var(--secondary); margin-top:0;">Lunes: Pecho/Tríceps</h3>
                <div class="ejercicio-item" onclick="verInfo('Flexiones Inclinadas', 'Pecho', 'Manos en silla, cuerpo recto. Baja controlado.', '3x8-12')">
                    <span class="nombre-ej">Flex. Inclinadas</span><input type="checkbox" class="check-box">
                </div>
                <div class="ejercicio-item" onclick="verInfo('Plancha', 'Abdomen', 'Aprieta abdomen y glúteos fuerte.', '3x30 seg')">
                    <span class="nombre-ej">Plancha</span><input type="checkbox" class="check-box">
                </div>
                <div class="ejercicio-item" onclick="verInfo('Cardio Lunes', 'Quema Grasa', 'Caminar muy rápido o subir escaleras.', '15 min')">
                    <span class="nombre-ej">Cardio Final</span><input type="checkbox" class="check-box">
                </div>
            </div>

            <div class="dia-card">
                <h3 style="color:var(--secondary); margin-top:0;">Martes: Piernas</h3>
                <div class="ejercicio-item" onclick="verInfo('Sentadillas Lentas', 'Piernas', 'Baja en 3 seg, sube en 1. Cuida la rodilla.', '4x12')">
                    <span class="nombre-ej">Sentadillas</span><input type="checkbox" class="check-box">
                </div>
                <div class="ejercicio-item" onclick="verInfo('Puente Glúteo', 'Glúteo', 'Eleva cadera y aprieta arriba.', '4x15')">
                    <span class="nombre-ej">Puente Glúteo</span><input type="checkbox" class="check-box">
                </div>
            </div>

            <div class="dia-card">
                <h3 style="color:var(--secondary); margin-top:0;">Miércoles: Espalda</h3>
                <div class="ejercicio-item" onclick="verInfo('Remo Mochila', 'Espalda', 'Espalda recta, lleva mochila al ombligo.', '4x12')">
                    <span class="nombre-ej">Remo Mochila</span><input type="checkbox" class="check-box">
                </div>
                <div class="ejercicio-item" onclick="verInfo('Crunch Abd', 'Abdomen', 'Contracción abdominal lenta.', '3x15')">
                    <span class="nombre-ej">Crunch Abd</span><input type="checkbox" class="check-box">
                </div>
            </div>
        </div>
        <button class="btn" style="margin-top:20px;" onclick="alert('¡Analizando progreso... sigue así!')">Analizar Entrenamiento</button>
    </div>
</div>

<div id="miModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarModal()">&times;</span>
        <h2 id="modalTitulo" style="color:var(--primary); margin-top:0;"></h2>
        <p id="modalDesc" style="line-height:1.6;"></p>
        <p><strong style="color:var(--accent);">Objetivo:</strong> <span id="modalObjetivo"></span></p>
    </div>
</div>

<script>
    let cont = 1;
    function guardarPeso(){
        let inicial = 85; let obj = 75;
        let act = parseFloat(document.getElementById("pesoActual").value);
        if(isNaN(act)) return;
        
        let prog = ((inicial-act)/(inicial-obj))*100;
        prog = Math.max(0, Math.min(100, prog));
        document.getElementById("barraPeso").style.width = prog + "%";
        
        let color = act < inicial ? "#00e676" : "#ff4b2b";
        document.getElementById("mensajePeso").innerText = act < inicial ? "¡Bajaste " + (inicial-act).toFixed(1) + "kg!" : "Sin cambios o subida.";
        document.getElementById("mensajePeso").style.color = color;

        let tabla = document.querySelector("#tablaPeso tbody");
        let fila = tabla.insertRow(0);
        fila.innerHTML = `<td>${cont++}</td><td>${act}kg</td><td style="color:${color}">${act < inicial ? '⬇' : '➡'}</td>`;
    }

    function verInfo(t, m, d, o) {
        document.getElementById("modalTitulo").innerText = t;
        document.getElementById("modalDesc").innerText = d;
        document.getElementById("modalObjetivo").innerText = o;
        document.getElementById("miModal").style.display = "block";
    }

    function cerrarModal() { document.getElementById("miModal").style.display = "none"; }
    
    window.onclick = function(e) { if (e.target == document.getElementById("miModal")) cerrarModal(); }
    
    document.querySelectorAll('.check-box').forEach(c => {
        c.addEventListener('click', (e) => e.stopPropagation());
    });
</script>

</body>
</html>
